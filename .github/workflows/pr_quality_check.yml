name: PR Code Quality Check

on:
  workflow_dispatch: 
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter by path
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'roommate-app/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/pr_quality_check.yml'
            server:
              - 'roommate-server/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/pr_quality_check.yml'

  app-quality:
    name: App Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    defaults:
      run:
        working-directory: roommate-app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'roommate-app/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Install root dependencies for ESLint
        run: npm install
        working-directory: .
      - name: Lint
        run: npm run lint
      - name: Format
        run: npm run format:check
      - name: Type Check
        run: npx tsc --noEmit

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    defaults:
      run:
        working-directory: roommate-server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'roommate-server/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run type-check
      - name: Format Check
        run: npm run format:check

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    defaults:
      run:
        working-directory: roommate-server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'roommate-server/package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test
      - name: Generate coverage report
        run: npm run test:coverage || echo "Skipping coverage"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' || needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js (App)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: roommate-app/package-lock.json
      - name: Audit App
        working-directory: roommate-app
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Setup Node.js (Server)
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: roommate-server/package-lock.json
      - name: Audit Server
        working-directory: roommate-server
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  pr-summary:
    name: PR Quality Summary
    runs-on: ubuntu-latest
    needs: [app-quality, server-quality, server-tests, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.app-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ Some critical checks failed. Please review."
            exit 1
          else
            echo "✅ All active checks passed!"
          fi