name: PR Code Quality Check

on:
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  filter-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter by path
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'roommate-app/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/pr_quality_check.yml'
            server:
              - 'roommate-server/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/pr_quality_check.yml'

  app-quality:
    name: App Quality Check
    runs-on: ubuntu-latest
    needs: filter-changes
    if: needs.filter-changes.outputs.app == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roommate-app/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix roommate-app
      - name: Lint
        run: npm run lint --prefix roommate-app
      - name: Format
        run: npm run format:check --prefix roommate-app
      - name: Type Check
        run: cd roommate-app && npx tsc --noEmit

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    needs: filter-changes
    if: needs.filter-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roommate-server/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix roommate-server
      - name: Lint & Type Check
        run: npm run lint --prefix roommate-server
      - name: Format Check
        run: npm run format:check --prefix roommate-server

  tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: filter-changes
    if: needs.filter-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roommate-server/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix roommate-server
      - name: Run vitest
        run: npm test --prefix roommate-server
      - name: Generate coverage report
        run: npm run test:coverage --prefix roommate-server || echo "Skipping coverage"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: filter-changes
    # Security scans run if anything changed
    if: needs.filter-changes.outputs.app == 'true' || needs.filter-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js (App)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roommate-app/package-lock.json
      - name: Audit App
        run: cd roommate-app && npm audit --audit-level=moderate
        continue-on-error: true # Keep PRs unblocked for informational audit
      - name: Setup Node.js (Server)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: roommate-server/package-lock.json
      - name: Audit Server
        run: cd roommate-server && npm audit --audit-level=moderate
        continue-on-error: true # Keep PRs unblocked for informational audit
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  code-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: filter-changes
    if: needs.filter-changes.outputs.app == 'true' || needs.filter-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CodeQL Init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - name: CodeQL Analyze
        uses: github/codeql-action/analyze@v3

  pr-summary:
    name: PR Quality Summary
    runs-on: ubuntu-latest
    needs: [app-quality, server-quality, tests, security-scan, code-analysis]
    if: always()
    steps:
      - name: Check results
        run: |
          # Check for failures. Skips are fine.
          if [[ "${{ needs.app-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.tests.result }}" == "failure" ]] || \
             [[ "${{ needs.code-analysis.result }}" == "failure" ]]; then
            echo "❌ Some critical checks failed. Please review."
            exit 1
          else
            echo "✅ All active checks passed!"
          fi