name: PR Code Quality Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened]

permissions:
    contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Filter by path
        uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref_name }}
          filters: |
            app:
              - 'roommate-app/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.github/workflows/pr_quality_check.yml'
            server:
              - 'roommate-server/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.github/workflows/pr_quality_check.yml'

  app-quality:
    name: App Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:app
      - name: Format
        run: npm run format:check --workspace=roommate-app
      - name: Type Check
        run: npx tsc --noEmit --project roommate-app/tsconfig.json

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=roommate-server
      - name: Run ESLint
        run: npm run lint:server
      - name: Type Check
        run: npm run type-check --workspace=roommate-server
      - name: Format Check
        run: npm run format:check --workspace=roommate-server

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    # Need to add docker-compose.yml and run docker-compose up -d
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npm run prisma:generate --workspace=roommate-server
      - name: Push Prisma Schema to Test DB
        run: npx prisma db push
        working-directory: roommate-server
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test_db' }}
      - name: Run vitest
        run: npm test --workspace=roommate-server
        env:
          APP_PORT: ${{ secrets.APP_PORT || '3000' }}
          BCRYPT_SALT_ROUNDS: ${{ secrets.BCRYPT_SALT_ROUNDS || '10' }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test_db' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret' }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN || '15m' }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN || '7d' }}
          USE_SECURE_COOKIE: ${{ secrets.USE_SECURE_COOKIE || 'false' }}
      - name: Generate coverage report
        run: npm run test:coverage --workspace=roommate-server || echo "Skipping coverage"
        env:
          APP_PORT: ${{ secrets.APP_PORT || '3000' }}
          BCRYPT_SALT_ROUNDS: ${{ secrets.BCRYPT_SALT_ROUNDS || '10' }}
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/test_db' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-jwt-secret' }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret' }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN || '15m' }}
          JWT_REFRESH_EXPIRES_IN: ${{ secrets.JWT_REFRESH_EXPIRES_IN || '7d' }}
          USE_SECURE_COOKIE: ${{ secrets.USE_SECURE_COOKIE || 'false' }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' || needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Audit workspaces
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  pr-summary:
    name: PR Quality Summary
    runs-on: ubuntu-latest
    needs: [app-quality, server-quality, server-tests, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.app-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ Some critical checks failed. Please review."
            exit 1
          else
            echo "✅ All active checks passed!"
          fi