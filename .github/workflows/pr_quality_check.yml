name: PR Code Quality Check

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Filter by path
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'roommate-app/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.github/workflows/pr_quality_check.yml'
            server:
              - 'roommate-server/**'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.js'
              - '.github/workflows/pr_quality_check.yml'

  app-quality:
    name: App Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:app
      - name: Format
        run: npm run format:check --workspace=roommate-app
      - name: Type Check
        run: npx tsc --noEmit --project roommate-app/tsconfig.json

  server-quality:
    name: Server Quality Check
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint:server
      - name: Type Check
        run: npm run type-check --workspace=roommate-server
      - name: Format Check
        run: npm run format:check --workspace=roommate-server

  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Run vitest
        run: npm test --workspace=roommate-server
      - name: Generate coverage report
        run: npm run test:coverage --workspace=roommate-server || echo "Skipping coverage"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' || needs.detect-changes.outputs.server == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      - name: Install dependencies
        run: npm ci
      - name: Audit workspaces
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  pr-summary:
    name: PR Quality Summary
    runs-on: ubuntu-latest
    needs: [app-quality, server-quality, server-tests, security-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.app-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-quality.result }}" == "failure" ]] || \
             [[ "${{ needs.server-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.security-scan.result }}" == "failure" ]]; then
            echo "❌ Some critical checks failed. Please review."
            exit 1
          else
            echo "✅ All active checks passed!"
          fi